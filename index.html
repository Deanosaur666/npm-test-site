<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <body>
    <div id="username"></div>
    <pre id="output"></pre>

    </div>
    <div>
      <label for="nodeIDInput">Node ID:</label>

    </div>

      <label for="nodeSizeInput">Node Size:</label>
      <input type="number" id="nodeSizeInput">
    </div>
    <div>
      <label for="nodeEdgesInput">Node Edges (comma separated):</label>
      <input type="text" id="nodeEdgesInput">
    </div>
    <div>
      <button id="addNodeButton">Add Node</button>
    </div>
    <div>
      <button id="removeNodeButton">Remove Node</button>
    </div>
    <div>
      <button id="uploadButton">Upload Graph</button>
    </div>
    <div>
      <button id="reloadButton">Reload Graph</button>
    </div>
    <hr>
    <div id="container" style="width: 800px; height: 600px;"></div>
  </body>
</html>
